name: RAG Quality Evaluation

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

jobs:
  evaluate:
    name: Run RAG Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ingest documents
        run: |
          python -c "
          from src.ingestion.pipeline import IngestionPipeline
          pipeline = IngestionPipeline()
          stats = pipeline.run()
          print(f'Ingested: {stats}')
          "

      - name: Run quality gate tests
        run: |
          python -m pytest eval/test_quality_gates.py -v --tb=long

      - name: Upload evaluation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: eval/reports/latest.json

      - name: Post results to PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report;
            try {
              report = JSON.parse(fs.readFileSync('eval/reports/latest.json', 'utf8'));
            } catch(e) {
              report = { summary: { error: 'Report not generated' } };
            }

            const s = report.summary;
            const status = (
              s.avg_answer_relevance >= 0.75 &&
              s.avg_citation_precision >= 0.70 &&
              s.avg_citation_recall >= 0.60 &&
              s.abstention_accuracy >= 0.80
            ) ? '✅ PASSED' : '❌ FAILED';

            const body = `## RAG Quality Evaluation ${status}

            | Metric | Score | Threshold | Status |
            |--------|-------|-----------|--------|
            | Answer Relevance | ${(s.avg_answer_relevance || 0).toFixed(4)} | ≥ 0.75 | ${s.avg_answer_relevance >= 0.75 ? '✅' : '❌'} |
            | Citation Precision | ${(s.avg_citation_precision || 0).toFixed(4)} | ≥ 0.70 | ${s.avg_citation_precision >= 0.70 ? '✅' : '❌'} |
            | Citation Recall | ${(s.avg_citation_recall || 0).toFixed(4)} | ≥ 0.60 | ${s.avg_citation_recall >= 0.60 ? '✅' : '❌'} |
            | Abstention Accuracy | ${(s.abstention_accuracy || 0).toFixed(4)} | ≥ 0.80 | ${s.abstention_accuracy >= 0.80 ? '✅' : '❌'} |

            **Total Questions:** ${s.total_questions || 0} (${s.answerable_questions || 0} answerable, ${s.unanswerable_questions || 0} unanswerable)`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body,
            });

  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: |
          python -m pytest tests/ -v --tb=short
